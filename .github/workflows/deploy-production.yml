name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloud Run (Production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_PROD_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROD_PROJECT_ID }}
          install_components: 'beta'

      - name: Build image via Cloud Build
        run: gcloud builds submit --config apps/api/cloudbuild-production.yaml .

      - name: Deploy to Cloud Run
        run: |
          gcloud beta run deploy enxoval-api-prod \
            --image gcr.io/${{ secrets.GCP_PROD_PROJECT_ID }}/production \
            --region us-east1 \
            --port 3000 \
            --platform managed \
            --allow-unauthenticated
