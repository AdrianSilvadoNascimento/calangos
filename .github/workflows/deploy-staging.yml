name: Deploy Staging

on:
  push:
    branches: [staging]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'turbo.json'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloud Run (Staging)
    runs-on: ubuntu-latest

    env:
      GCP_REGION: us-east1
      AR_REPO: enxoval
      SERVICE: enxoval-api-staging
      IMAGE_NAME: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_STAGING_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_STAGING_PROJECT_ID }}

      - name: Build image via Cloud Build
        run: |
          gcloud builds submit \
            --config apps/api/cloudbuild-staging.yaml \
            --substitutions=_REGION=${{ env.GCP_REGION }},_REPO=${{ env.AR_REPO }},_IMAGE=${{ env.IMAGE_NAME }},_SHA=${{ github.sha }} \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_STAGING_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --concurrency 80 \
            --timeout 300 \
            --cpu-boost \
            --set-env-vars "^@^NODE_ENV=production@APP_SCHEME=enxoval@PUSHER_CLUSTER=sa1@BETTER_AUTH_URL=${{ secrets.STG_BETTER_AUTH_URL }}@TRUSTED_ORIGINS=${{ secrets.STG_TRUSTED_ORIGINS }}@DATABASE_URL=${{ secrets.STG_DATABASE_URL }}@BETTER_AUTH_SECRET=${{ secrets.STG_BETTER_AUTH_SECRET }}@PUSHER_APP_ID=${{ secrets.STG_PUSHER_APP_ID }}@PUSHER_KEY=${{ secrets.STG_PUSHER_KEY }}@PUSHER_SECRET=${{ secrets.STG_PUSHER_SECRET }}"

      - name: Smoke test (health endpoint)
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "Service URL: $URL"
          for i in 1 2 3 4 5; do
            if curl -fsS "$URL/health" >/dev/null; then
              echo "Health OK"; exit 0
            fi
            echo "Attempt $i failed, retrying..."; sleep 5
          done
          echo "Health check failed"; exit 1
